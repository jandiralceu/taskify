basePath: /api/v1
definitions:
  apperrors.InvalidParam:
    properties:
      field:
        type: string
      reason:
        type: string
    type: object
  dto.ChangePasswordRequest:
    properties:
      newPassword:
        type: string
      oldPassword:
        type: string
    required:
    - newPassword
    - oldPassword
    type: object
  dto.CreateTaskNoteRequest:
    properties:
      content:
        minLength: 1
        type: string
    required:
    - content
    type: object
  dto.CreateTaskRequest:
    properties:
      assignedTo:
        type: string
      description:
        type: string
      dueDate:
        type: string
      estimatedHours:
        minimum: 0
        type: number
      isBlocked:
        type: boolean
      priority:
        allOf:
        - $ref: '#/definitions/models.TaskPriority'
        enum:
        - low
        - medium
        - high
        - critical
      status:
        allOf:
        - $ref: '#/definitions/models.TaskStatus'
        enum:
        - pending
        - in_progress
        - completed
        - cancelled
      title:
        maxLength: 255
        minLength: 3
        type: string
    required:
    - title
    type: object
  dto.RefreshTokenRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  dto.RefreshTokenResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        maxLength: 255
        type: string
      firstName:
        maxLength: 100
        minLength: 2
        type: string
      lastName:
        maxLength: 100
        minLength: 2
        type: string
      password:
        minLength: 8
        type: string
      role:
        enum:
        - admin
        - employee
        type: string
    required:
    - email
    - firstName
    - lastName
    - password
    - role
    type: object
  dto.SignInRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.SignInResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  dto.SignOutRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  dto.UpdateTaskNoteRequest:
    properties:
      content:
        minLength: 1
        type: string
    required:
    - content
    type: object
  dto.UpdateTaskRequest:
    properties:
      actualHours:
        minimum: 0
        type: number
      assignedTo:
        type: string
      description:
        type: string
      dueDate:
        type: string
      estimatedHours:
        minimum: 0
        type: number
      isArchived:
        type: boolean
      isBlocked:
        type: boolean
      priority:
        allOf:
        - $ref: '#/definitions/models.TaskPriority'
        enum:
        - low
        - medium
        - high
        - critical
      status:
        allOf:
        - $ref: '#/definitions/models.TaskStatus'
        enum:
        - pending
        - in_progress
        - completed
        - cancelled
      title:
        maxLength: 255
        minLength: 3
        type: string
    type: object
  dto.UpdateUserRequest:
    properties:
      firstName:
        maxLength: 100
        minLength: 2
        type: string
      isActive:
        type: boolean
      lastName:
        maxLength: 100
        minLength: 2
        type: string
      role:
        enum:
        - admin
        - employee
        type: string
    type: object
  dto.UserListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.User'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  handlers.ProblemDetails:
    properties:
      detail:
        type: string
      invalid_params:
        items:
          $ref: '#/definitions/apperrors.InvalidParam'
        type: array
      title:
        type: string
      trace_id:
        type: string
      type:
        type: string
    type: object
  models.Permission:
    properties:
      action:
        type: string
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      resource:
        type: string
      updatedAt:
        type: string
    type: object
  models.RoleModel:
    properties:
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/models.Permission'
        type: array
      updatedAt:
        type: string
    type: object
  models.Task:
    properties:
      actualHours:
        type: number
      assignedTo:
        type: string
      assignee:
        $ref: '#/definitions/models.User'
      attachments:
        items:
          $ref: '#/definitions/models.TaskAttachment'
        type: array
      attachmentsCount:
        type: integer
      completedAt:
        type: string
      createdAt:
        type: string
      createdBy:
        type: string
      description:
        type: string
      dueDate:
        type: string
      estimatedHours:
        type: number
      id:
        type: string
      isArchived:
        type: boolean
      isBlocked:
        type: boolean
      notes:
        items:
          $ref: '#/definitions/models.TaskNote'
        type: array
      notesCount:
        description: UI Fields (populated via subqueries)
        type: integer
      priority:
        $ref: '#/definitions/models.TaskPriority'
      status:
        $ref: '#/definitions/models.TaskStatus'
      title:
        type: string
      updatedAt:
        type: string
    type: object
  models.TaskAttachment:
    properties:
      createdAt:
        type: string
      fileName:
        type: string
      filePath:
        type: string
      fileSize:
        type: integer
      id:
        type: string
      mimeType:
        type: string
      taskId:
        type: string
      updatedAt:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/models.User'
        description: Associations
      userId:
        type: string
    type: object
  models.TaskNote:
    properties:
      content:
        type: string
      createdAt:
        type: string
      id:
        type: string
      taskId:
        type: string
      updatedAt:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/models.User'
        description: Associations
      userId:
        type: string
    type: object
  models.TaskPriority:
    enum:
    - low
    - medium
    - high
    - critical
    type: string
    x-enum-varnames:
    - TaskPriorityLow
    - TaskPriorityMedium
    - TaskPriorityHigh
    - TaskPriorityCritical
  models.TaskStatus:
    enum:
    - pending
    - in_progress
    - completed
    - cancelled
    type: string
    x-enum-varnames:
    - TaskStatusPending
    - TaskStatusInProgress
    - TaskStatusCompleted
    - TaskStatusCancelled
  models.User:
    properties:
      avatarUrl:
        type: string
      createdAt:
        type: string
      email:
        type: string
      firstName:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      lastName:
        type: string
      role:
        description: Virtual field for role specification on creation
        type: string
      roles:
        items:
          $ref: '#/definitions/models.RoleModel'
        type: array
      updatedAt:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: Jandir A. Cutabiala
    url: https://github.com/jandiralceu/taskify
  description: REST API for a Task Management System built with Go and Gin.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Taskify API
  version: "1.0"
paths:
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Rotates the session by issuing a new access and refresh token pair
        using a valid refresh token.
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New tokens generated successfully
          schema:
            $ref: '#/definitions/dto.RefreshTokenResponse'
        "400":
          description: Invalid request format
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "401":
          description: Invalid, expired or already used refresh token
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "429":
          description: Too many requests
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Refresh session
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account with name, email, password and assigned
        role.
      parameters:
      - description: User registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "204":
          description: User registered successfully
        "400":
          description: Invalid input or validation error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "409":
          description: Email already in use
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "429":
          description: Too many requests
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Register a new user
      tags:
      - auth
  /auth/signin:
    post:
      consumes:
      - application/json
      description: Logs in a user with email and password, returning access and refresh
        tokens.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.SignInRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Tokens generated successfully
          schema:
            $ref: '#/definitions/dto.SignInResponse'
        "400":
          description: Invalid request format
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "401":
          description: Invalid email or password
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "429":
          description: Too many requests
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Authenticate user
      tags:
      - auth
  /auth/signout:
    post:
      consumes:
      - application/json
      description: Invalidates the session by deleting the refresh token from the
        server-side cache.
      parameters:
      - description: Token to invalidate
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.SignOutRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Successfully logged out
        "400":
          description: Invalid request format
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "401":
          description: Invalid or expired refresh token
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "429":
          description: Too many requests
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: User logout
      tags:
      - auth
  /tasks:
    get:
      consumes:
      - application/json
      description: Get all active (non-archived) tasks with optional filtering.
      parameters:
      - description: Filter by status (pending, in_progress, completed, cancelled)
        in: query
        name: status
        type: string
      - description: Filter by priority (low, medium, high, critical)
        in: query
        name: priority
        type: string
      - description: Filter by blocked status
        in: query
        name: isBlocked
        type: boolean
      - description: Search in title/description
        in: query
        name: search
        type: string
      - description: Filter by assigned user ID
        in: query
        name: assignedTo
        type: string
      - description: Sort field (e.g. createdAt, title)
        in: query
        name: sort
        type: string
      - description: 'Sort order: asc or desc'
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Task'
            type: array
      security:
      - Bearer: []
      summary: List active tasks
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Creates a new task associated with the authenticated user.
      parameters:
      - description: Task details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Task'
      security:
      - Bearer: []
      summary: Create a new task
      tags:
      - tasks
  /tasks/{id}:
    delete:
      consumes:
      - application/json
      description: Permanently removes a task.
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      security:
      - Bearer: []
      summary: Delete a task
      tags:
      - tasks
    get:
      consumes:
      - application/json
      description: Retrieves a single task by its unique ID, including notes and attachments.
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Task'
      security:
      - Bearer: []
      summary: Get task by ID
      tags:
      - tasks
    patch:
      consumes:
      - application/json
      description: Updates an existing task's details.
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      - description: Updated task details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Task'
      security:
      - Bearer: []
      summary: Update a task
      tags:
      - tasks
  /tasks/{id}/attachments:
    get:
      consumes:
      - application/json
      description: Retrieves all attachments associated with a specific task.
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.TaskAttachment'
            type: array
      security:
      - Bearer: []
      summary: Get all attachments for a task
      tags:
      - tasks
    post:
      consumes:
      - multipart/form-data
      description: Uploads a file and attaches it to the specified task.
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.TaskAttachment'
      security:
      - Bearer: []
      summary: Add an attachment to a task
      tags:
      - tasks
  /tasks/{id}/notes:
    get:
      consumes:
      - application/json
      description: Retrieves all notes associated with a specific task.
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.TaskNote'
            type: array
      security:
      - Bearer: []
      summary: Get all notes for a task
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Creates a new note associated with the specified task.
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      - description: Note content
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateTaskNoteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.TaskNote'
      security:
      - Bearer: []
      summary: Add a note to a task
      tags:
      - tasks
  /tasks/archived:
    get:
      consumes:
      - application/json
      description: Get all archived tasks with optional filtering.
      parameters:
      - description: Filter by status (pending, in_progress, completed, cancelled)
        in: query
        name: status
        type: string
      - description: Filter by priority (low, medium, high, critical)
        in: query
        name: priority
        type: string
      - description: Filter by blocked status
        in: query
        name: isBlocked
        type: boolean
      - description: Search in title/description
        in: query
        name: search
        type: string
      - description: Filter by assigned user ID
        in: query
        name: assignedTo
        type: string
      - description: Sort field (e.g. createdAt, title)
        in: query
        name: sort
        type: string
      - description: 'Sort order: asc or desc'
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Task'
            type: array
      security:
      - Bearer: []
      summary: List archived tasks
      tags:
      - tasks
  /tasks/attachments/{attachmentId}:
    delete:
      consumes:
      - application/json
      description: Permanently removes an attachment and its file from disk. Only
        the author can delete it.
      parameters:
      - description: Attachment UUID
        in: path
        name: attachmentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      security:
      - Bearer: []
      summary: Delete an attachment
      tags:
      - tasks
  /tasks/notes/{noteId}:
    delete:
      consumes:
      - application/json
      description: Permanently removes a note. Only the author can delete it.
      parameters:
      - description: Note UUID
        in: path
        name: noteId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      security:
      - Bearer: []
      summary: Delete a task note
      tags:
      - tasks
    patch:
      consumes:
      - application/json
      description: Updates the content of an existing note. Only the author can update
        it.
      parameters:
      - description: Note UUID
        in: path
        name: noteId
        required: true
        type: string
      - description: New note content
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateTaskNoteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.TaskNote'
      security:
      - Bearer: []
      summary: Update a task note
      tags:
      - tasks
  /users:
    get:
      consumes:
      - application/json
      description: Get a paginated list of users. Supports filtering by name, email,
        and role.
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Number of items per page
        in: query
        name: limit
        type: integer
      - description: Filter by first name
        in: query
        name: first_name
        type: string
      - description: Filter by last name
        in: query
        name: last_name
        type: string
      - description: Filter by email
        in: query
        name: email
        type: string
      - description: Filter by role (admin, employee)
        in: query
        name: role
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      security:
      - Bearer: []
      summary: List all users
      tags:
      - users
  /users/{id}:
    delete:
      consumes:
      - application/json
      description: Permanently remove a user from the system by their unique ID.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      security:
      - Bearer: []
      summary: Delete user
      tags:
      - users
    get:
      consumes:
      - application/json
      description: Retrieve details for a single user using their unique ID.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      security:
      - Bearer: []
      summary: Get user by ID
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: Updates a user's profile information by their unique ID. Admin
        only.
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      - description: User update data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
