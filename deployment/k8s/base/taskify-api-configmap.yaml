apiVersion: v1
kind: ConfigMap
metadata:
  name: taskify-api-configmap
  namespace: taskify
data:
  APP_NAME: "taskify-api"
  APP_PORT: "8080"
  ENV: "production"
  DB_HOST: "taskify-postgres"
  DB_PORT: "5432"
  DB_USER: "taskuser"
  DB_NAME: "taskify"
  DB_SSL_MODE: "disable"
  REDIS_HOST: "taskify-redis"
  REDIS_PORT: "6379"
  OTLP_ENDPOINT: "taskify-jaeger:4317"
  RATE_LIMIT_GLOBAL: "100-M"
  RATE_LIMIT_AUTH: "10-M"
  UPLOAD_PATH: "/app/uploads"
  PRIVATE_KEY_PATH: "/app/private.pem"
  PUBLIC_KEY_PATH: "/app/public.pem"
