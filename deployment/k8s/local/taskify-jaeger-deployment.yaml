apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskify-jaeger
  namespace: taskify
  labels:
    app: taskify-jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskify-jaeger
  template:
    metadata:
      labels:
        app: taskify-jaeger
    spec:
      containers:
        - name: taskify-jaeger
          image: jaegertracing/all-in-one:1.60
          ports:
            - containerPort: 16686
            - containerPort: 4317 # OTLP gRPC
            - containerPort: 4318 # OTLP HTTP
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 5
            periodSeconds: 5
