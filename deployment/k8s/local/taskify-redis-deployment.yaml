apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskify-redis
  namespace: taskify
  labels:
    app: taskify-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskify-redis
  template:
    metadata:
      labels:
        app: taskify-redis
    spec:
      containers:
        - name: taskify-redis
          image: redis:7.4-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
