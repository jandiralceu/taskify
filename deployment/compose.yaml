services:
  db:
    container_name: taskify-postgres
    image: postgres:17.0
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: jandiralceu
      POSTGRES_PASSWORD: nk6eloPZ1FQk8Ku1
      POSTGRES_DB: taskify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jandiralceu -d taskify"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - taskify-network
    volumes:
      - db_data:/var/lib/postgresql/data

  jaeger:
    container_name: taskify-jaeger
    image: jaegertracing/all-in-one:latest
    restart: always
    ports:
      - 4317:4317   # OTLP gRPC (receives traces from the app)
      - 16686:16686 # Web UI (http://localhost:16686)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - taskify-network

  redis:
    container_name: taskify-redis
    image: redis:7-alpine
    restart: always
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - taskify-network
    volumes:
      - redis_data:/data

  migrate:
    container_name: taskify-migrate
    image: migrate/migrate
    volumes:
      - ../backend/migrations:/migrations
    networks:
      - taskify-network
    depends_on:
      db:
        condition: service_healthy
    command:
      - -path=/migrations/
      - -database=postgres://jandiralceu:nk6eloPZ1FQk8Ku1@db:5432/taskify?sslmode=disable
      - up

  api:
    container_name: taskify-api
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    profiles:
      - "all"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    environment:
      - DB_HOST=db
      - DB_USER=jandiralceu
      - DB_PASSWORD=nk6eloPZ1FQk8Ku1
      - DB_NAME=taskify
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OTLP_ENDPOINT=jaeger:4317
    volumes:
      - ../backend/private.pem:/app/private.pem:ro
      - ../backend/public.pem:/app/public.pem:ro
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - taskify-network

  frontend:
    container_name: taskify-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - PUBLIC_API_URL=/api/v1
    ports:
      - "3000:80"
    profiles:
      - "all"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - taskify-network
    volumes:
      - uploads_data:/usr/share/nginx/html/uploads:ro

networks:
  taskify-network:
    driver: bridge

volumes:
  db_data:
  redis_data:
  uploads_data:
