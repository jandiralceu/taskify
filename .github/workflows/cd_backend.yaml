name: CD Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/cd_backend.yaml"

defaults:
  run:
    working-directory: backend

jobs:
  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.2"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run Unit Tests with Coverage
        run: go test -v -short -coverprofile=unit_coverage.out -covermode=atomic ./...

      - name: Run Integration Tests with Coverage
        run: go test -v -tags=integration -coverprofile=integration_coverage.out -covermode=atomic -coverpkg=./internal/... ./tests/integration/...
        # Note: Integration tests may fail on CI if they require a live database.
        # Consider using testcontainers or mocking for CI stability.
        continue-on-error: true

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: backend/unit_coverage.out,backend/integration_coverage.out
          flags: api-service
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: jandiralceu/taskify
          fail_ci_if_error: false

  build-and-push:
    name: 🐳 Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: jandir/taskify-backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
